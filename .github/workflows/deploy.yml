name: VPS Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hostinger VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: srv1651644.hstgr.cloud
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            if [ -d "/root/bapmate_v2_web" ]; then
              cd /root/bapmate_v2_web
            elif [ -d "/home/root/bapmate_v2_web" ]; then
              cd /home/root/bapmate_v2_web
            else
              echo "Repository not found on VPS, cloning..."
              git clone https://github.com/7ames7in/bapmate_v2_web.git /root/bapmate_v2_web
              cd /root/bapmate_v2_web
            fi
            chmod +x deploy.sh
            ./deploy.sh
